---
deployment:
  tasks:
    - export DEPLOYPATH=/home/linhercom/public_html/move
    - /bin/mkdir -p "$DEPLOYPATH"
    - export NPM_BIN=/opt/cpanel/ea-nodejs20/bin/npm
    - if [ ! -x "$NPM_BIN" ]; then NPM_BIN=/opt/cpanel/ea-nodejs18/bin/npm; fi
    - if [ ! -x "$NPM_BIN" ]; then NPM_BIN=/usr/local/bin/npm; fi
    - if [ ! -x "$NPM_BIN" ]; then NPM_BIN=/usr/bin/npm; fi
    - if [ ! -x "$NPM_BIN" ]; then echo "ERROR: npm binary not found or not executable"; exit 1; fi
    - "$NPM_BIN" ci --prefix frontend
    - "$NPM_BIN" run build --prefix frontend
    - test -f frontend/dist/index.html
    - /bin/cp -R frontend/dist/. "$DEPLOYPATH"
    - echo "Deploy completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$DEPLOYPATH/.deploy-info.txt"
